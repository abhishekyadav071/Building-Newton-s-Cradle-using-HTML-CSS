<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lightbulb Newton's Cradle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="cradle">
    <div class="pendulum left-swing">
      <div class="string"></div>
      <div class="bulb-base"></div>
      <div class="bulb"></div>
    </div>

    <div class="pendulum">
      <div class="string"></div>
      <div class="bulb-base"></div>
      <div class="bulb"></div>
    </div>

    <div class="pendulum">
      <div class="string"></div>
      <div class="bulb-base"></div>
      <div class="bulb"></div>
    </div>

    <div class="pendulum">
      <div class="string"></div>
      <div class="bulb-base"></div>
      <div class="bulb"></div>
    </div>

    <div class="pendulum right-swing">
      <div class="string"></div>
      <div class="bulb-base"></div>
      <div class="bulb"></div>
    </div>
  </div>

</body>
</html>
